<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트 패턴 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #080c14;
  --bg1: #0d1220;
  --bg2: #121828;
  --bg3: #1a2236;
  --bd:  #1e2d44;
  --bd2: #2a3d58;
  --tx0: #e4ecf8;
  --tx1: #8899bb;
  --tx2: #445577;
  --up:  #00d68a;
  --dn:  #ff4466;
  --yl:  #ffcc00;
  --cy:  #22ddff;
  --pu:  #aa88ff;
  --fm:  'IBM Plex Mono', monospace;
  --fk:  'Noto Sans KR', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:var(--bg0); color:var(--tx0); font-family:var(--fk); height:100%; overflow-x:hidden; }

/* 헤더 */
header {
  padding: 18px 28px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg1);
}
.logo {
  font-family: var(--fm);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--cy);
}
.logo span { color: var(--tx1); }
.subtitle { font-size: 12px; color: var(--tx2); margin-top: 2px; }

/* 메인 레이아웃 */
#app {
  display: grid;
  grid-template-columns: 1fr 440px;
  gap: 0;
  height: calc(100vh - 61px);
}

/* 좌측 업로드/이미지 영역 */
#left {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--bd);
  min-height: 0;
}

/* 드롭존 */
#dropzone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .3s;
  position: relative;
  overflow: hidden;
  background: var(--bg1);
}
#dropzone.drag-over {
  background: rgba(34,221,255,.04);
  border-color: var(--cy) !important;
}
#dropzone.has-image { cursor: default; }

.drop-ui {
  text-align: center;
  pointer-events: none;
  padding: 40px;
}
.drop-icon {
  font-size: 56px;
  margin-bottom: 16px;
  opacity: .6;
}
.drop-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--tx0);
  margin-bottom: 8px;
}
.drop-desc {
  font-size: 13px;
  color: var(--tx1);
  line-height: 1.7;
}
.drop-btn {
  margin-top: 20px;
  padding: 10px 24px;
  background: var(--bg3);
  border: 1px solid var(--bd2);
  border-radius: 6px;
  color: var(--cy);
  font-family: var(--fm);
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
  pointer-events: all;
}
.drop-btn:hover { background: rgba(34,221,255,.1); border-color: var(--cy); }

#preview-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 12px;
  display: none;
}

/* 툴바 */
#toolbar {
  padding: 10px 16px;
  background: var(--bg2);
  border-top: 1px solid var(--bd);
  display: flex;
  gap: 8px;
  align-items: center;
}
#analyze-btn {
  padding: 8px 22px;
  background: linear-gradient(135deg, var(--cy), #0099cc);
  border: none;
  border-radius: 5px;
  color: #000;
  font-family: var(--fm);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 1px;
}
#analyze-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
#analyze-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
#clear-btn {
  padding: 8px 16px;
  background: var(--bg3);
  border: 1px solid var(--bd2);
  border-radius: 5px;
  color: var(--tx1);
  font-family: var(--fm);
  font-size: 12px;
  cursor: pointer;
}
#clear-btn:hover { border-color: var(--dn); color: var(--dn); }
#file-status { font-size: 12px; color: var(--tx2); margin-left: auto; }

/* 우측 결과 패널 */
#right {
  display: flex;
  flex-direction: column;
  background: var(--bg1);
  overflow: hidden;
}
#result-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  flex-shrink: 0;
}
#result-title {
  font-family: var(--fm);
  font-size: 13px;
  font-weight: 600;
  color: var(--tx0);
}
#result-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg3);
  color: var(--tx2);
  border: 1px solid var(--bd);
}

#result-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 대기 상태 */
#result-idle {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--tx2);
  gap: 12px;
}
.idle-icon { font-size: 40px; opacity: .4; }
.idle-text { font-size: 13px; line-height: 1.7; text-align: center; }

/* 로딩 */
#result-loading {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--bd2);
  border-top-color: var(--cy);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--tx1); font-family: var(--fm); }
.loading-dots::after {
  content: '';
  animation: dots 1.5s infinite;
}
@keyframes dots {
  0%   { content: ''; }
  33%  { content: '.'; }
  66%  { content: '..'; }
  100% { content: '...'; }
}

/* 결과 카드들 */
.result-cards { display: flex; flex-direction: column; gap: 10px; }

/* 단계 뱃지 */
#stage-card {
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  border: 2px solid;
}
#stage-number {
  font-family: var(--fm);
  font-size: 40px;
  font-weight: 700;
  line-height: 1;
}
#stage-name {
  font-size: 18px;
  font-weight: 700;
  margin: 6px 0 4px;
}
#stage-desc {
  font-size: 12px;
  opacity: .7;
}

/* 지표 카드 */
.indicator-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.ind-card {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 6px;
  padding: 10px 12px;
}
.ind-label {
  font-size: 10px;
  color: var(--tx2);
  font-family: var(--fm);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.ind-value {
  font-size: 14px;
  font-weight: 700;
  font-family: var(--fm);
}
.ind-sub {
  font-size: 10px;
  color: var(--tx2);
  margin-top: 2px;
}

/* 섹션 카드 */
.sec-card {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 6px;
  overflow: hidden;
}
.sec-title {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--tx2);
  background: var(--bg3);
  border-bottom: 1px solid var(--bd);
  font-family: var(--fm);
}
.sec-body {
  padding: 10px 12px;
  font-size: 12px;
  color: var(--tx1);
  line-height: 1.8;
}
.sec-body b { color: var(--tx0); }

/* 체크리스트 */
.checklist { display: flex; flex-direction: column; gap: 5px; padding: 10px 12px; }
.check-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.check-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.check-ok   .check-dot { background: var(--up); box-shadow: 0 0 6px var(--up); }
.check-warn .check-dot { background: var(--yl); box-shadow: 0 0 6px var(--yl); }
.check-no   .check-dot { background: var(--dn); box-shadow: 0 0 6px var(--dn); }
.check-ok   { color: var(--tx0); }
.check-warn { color: var(--yl); }
.check-no   { color: var(--tx1); }

/* 종합 판정 */
#verdict-card {
  border-radius: 8px;
  padding: 16px;
  border: 1px solid;
}
#verdict-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}
#verdict-body {
  font-size: 12px;
  line-height: 1.8;
  color: var(--tx1);
}
#verdict-body b { color: var(--tx0); }

/* 경고 */
.warning-box {
  background: rgba(255,68,102,.06);
  border: 1px solid rgba(255,68,102,.3);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 11px;
  color: var(--tx1);
  line-height: 1.7;
}

/* 스크롤바 */
#result-body::-webkit-scrollbar { width: 4px; }
#result-body::-webkit-scrollbar-track { background: var(--bg0); }
#result-body::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

/* 반응형 */
@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
  #left { border-right: none; border-bottom: 1px solid var(--bd); }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">CHART<span>.</span>AI</div>
    <div class="subtitle">세력 매집 패턴 자동 분석기 — 스크린샷을 드래그하세요</div>
  </div>
  <div style="font-size:11px;color:var(--tx2);text-align:right;line-height:1.6">
    ① 하락추세 → ② 바닥형성 → ③ 예열<br>→ ④ 매집완료 → ⑤ 폭발직전
  </div>
</header>

<div id="app">

  <!-- 좌측 -->
  <div id="left">
    <div id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="drop-ui" id="drop-ui">
        <div class="drop-icon">📊</div>
        <div class="drop-title">차트 스크린샷 업로드</div>
        <div class="drop-desc">
          드래그 & 드롭 또는 클릭하여 파일 선택<br>
          PNG · JPG · WEBP 지원
        </div>
        <button class="drop-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
          📁 파일 선택
        </button>
      </div>
      <img id="preview-img" alt="업로드된 차트">
    </div>
    <div id="toolbar">
      <button id="analyze-btn" onclick="analyze()" disabled>🔍 AI 분석 시작</button>
      <button id="clear-btn" onclick="clearAll()">✕ 초기화</button>
      <span id="file-status">이미지 없음</span>
    </div>
  </div>

  <!-- 우측 -->
  <div id="right">
    <div id="result-header">
      <span id="result-title">분석 결과</span>
      <span id="result-badge">대기중</span>
    </div>
    <div id="result-body">

      <!-- 대기 상태 -->
      <div id="result-idle">
        <div class="idle-icon">🔬</div>
        <div class="idle-text">
          차트 스크린샷을 업로드하면<br>
          AI가 자동으로 현재 단계를 분석합니다<br><br>
          <span style="color:var(--tx2);font-size:11px">
            · VWAP 위치<br>
            · 거래량 패턴<br>
            · OI 방향<br>
            · RSI 수준<br>
            · 현재 단계 (①~⑤)
          </span>
        </div>
      </div>

      <!-- 로딩 -->
      <div id="result-loading">
        <div class="spinner"></div>
        <div class="loading-text">분석 중<span class="loading-dots"></span></div>
        <div style="font-size:11px;color:var(--tx2);text-align:center">
          차트 패턴 인식 중<br>지표 해석 중
        </div>
      </div>

    </div>
  </div>

</div>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">

<script>
let currentImageB64 = null;
let currentFile = null;

/* ── 파일 처리 ── */
const dropzone = document.getElementById('dropzone');

dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('drag-over');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) handleFile(file);
});

function handleFile(file) {
  if(!file) return;
  currentFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentImageB64 = dataUrl.split(',')[1];

    const img = document.getElementById('preview-img');
    img.src = dataUrl;
    img.style.display = 'block';
    document.getElementById('drop-ui').style.display = 'none';
    dropzone.classList.add('has-image');

    document.getElementById('analyze-btn').disabled = false;
    document.getElementById('file-status').textContent = file.name + ' (' + (file.size/1024).toFixed(0) + 'KB)';
  };
  reader.readAsDataURL(file);
}

function clearAll() {
  currentImageB64 = null;
  currentFile = null;
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('drop-ui').style.display = 'block';
  dropzone.classList.remove('has-image');
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('file-status').textContent = '이미지 없음';
  showIdle();
  document.getElementById('result-badge').textContent = '대기중';
  document.getElementById('result-badge').style.color = '';
}

function showIdle() {
  document.getElementById('result-idle').style.display = 'flex';
  document.getElementById('result-loading').style.display = 'none';
  document.querySelectorAll('.result-cards').forEach(el => el.remove());
}

/* ── AI 분석 ── */
async function analyze() {
  if(!currentImageB64) return;

  // UI 전환
  document.getElementById('result-idle').style.display = 'none';
  document.getElementById('result-loading').style.display = 'flex';
  document.querySelectorAll('.result-cards').forEach(el => el.remove());
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('result-badge').textContent = '분석중...';
  document.getElementById('result-badge').style.color = 'var(--cy)';

  const prompt = `
당신은 암호화폐 차트 전문 분석가입니다. 다음 5단계 패턴을 기준으로 업로드된 차트를 분석하세요.

## 5단계 패턴 기준:
① 하락 추세: 지속 하락, 거래량 감소, OI 감소, 시장 관심 식음
② 바닥 형성: 가격 하락 멈춤, 거래량 매우 낮음, OI 바닥권, 조용한 횡보
③ 예열 단계: 미세한 반등, 거래량 조금씩 증가, OI 바닥 찍고 반전, RSI 저점 다이버전스
④ 매집 완료: VWAP 위 안착, 눌림 시 매수세 유입, 거래량 유지, OI 지속 증가
⑤ 폭발 직전: 거래량 급증, OI 급증, RSI 50 이상, 가격 저항선 돌파 임박

## 반드시 JSON 형식으로만 답변하세요. 다른 텍스트 없이 JSON만:
{
  "stage": 숫자(1~5),
  "stage_name": "단계명",
  "stage_color": "CSS색상코드(#rrggbb)",
  "confidence": 숫자(0~100, 확신도%),
  "indicators": {
    "vwap": {"status": "위/아래/불명확", "detail": "한줄설명"},
    "volume": {"status": "감소/낮음/증가/유지/급증/불명확", "detail": "한줄설명"},
    "oi": {"status": "감소/바닥/반전/증가/급증/불명확", "detail": "한줄설명"},
    "rsi": {"status": "과매도/다이버전스/50이상/과열/불명확", "detail": "한줄설명", "value": "숫자또는불명확"}
  },
  "checklist": [
    {"item": "OI 바닥 → 반전", "status": "ok/warn/no"},
    {"item": "거래량 증가 (예열)", "status": "ok/warn/no"},
    {"item": "VWAP 위 안착", "status": "ok/warn/no"},
    {"item": "눌림 매수 반복", "status": "ok/warn/no"},
    {"item": "낙폭 축소", "status": "ok/warn/no"},
    {"item": "회복 속도 빨라짐", "status": "ok/warn/no"}
  ],
  "summary": "현재 상황을 2~3문장으로 설명 (한국어)",
  "action": "지금 취해야 할 행동 (매수준비/관망/분할매수/추격금지 등)",
  "action_detail": "구체적인 행동 지침 2~3문장 (한국어)",
  "warning": "주의사항 1~2문장 (한국어)"
}`;

  try {
    const ext = currentFile?.type || 'image/png';
    const mediaType = ext.includes('jpg') || ext.includes('jpeg') ? 'image/jpeg'
                    : ext.includes('webp') ? 'image/webp'
                    : 'image/png';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: currentImageB64 }
            },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '';

    // JSON 파싱
    let result;
    try {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      result = JSON.parse(cleaned);
    } catch(e) {
      throw new Error('AI 응답 파싱 실패: ' + raw.substring(0, 100));
    }

    renderResult(result);

  } catch(err) {
    renderError(err.message);
  }

  document.getElementById('analyze-btn').disabled = false;
}

/* ── 결과 렌더링 ── */
function renderResult(r) {
  document.getElementById('result-loading').style.display = 'none';
  document.getElementById('result-badge').textContent = '분석 완료';
  document.getElementById('result-badge').style.color = 'var(--up)';

  // 단계 색상 매핑
  const stageColors = {
    1: { bg: 'rgba(255,68,102,.08)', border: 'var(--dn)',  text: 'var(--dn)' },
    2: { bg: 'rgba(255,204,0,.06)',  border: 'var(--yl)',  text: 'var(--yl)' },
    3: { bg: 'rgba(34,221,255,.06)', border: 'var(--cy)',  text: 'var(--cy)' },
    4: { bg: 'rgba(170,136,255,.06)',border: 'var(--pu)',  text: 'var(--pu)' },
    5: { bg: 'rgba(0,214,138,.08)',  border: 'var(--up)',  text: 'var(--up)' },
  };
  const sc = stageColors[r.stage] || stageColors[1];

  // 행동 색상
  const actionColor = r.action?.includes('매수') ? 'var(--up)'
                    : r.action?.includes('관망') ? 'var(--tx1)'
                    : r.action?.includes('추격금지') ? 'var(--dn)'
                    : 'var(--yl)';

  const html = `
<div class="result-cards">

  <!-- 단계 카드 -->
  <div id="stage-card" style="background:${sc.bg};border-color:${sc.border}">
    <div id="stage-number" style="color:${sc.text}">⑤ ${r.stage}</div>
    <div id="stage-name" style="color:${sc.text}">${escHtml(r.stage_name)}</div>
    <div id="stage-desc" style="color:var(--tx1)">분석 확신도 ${r.confidence}%</div>
    <div style="margin-top:8px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden">
      <div style="width:${r.confidence}%;height:100%;background:${sc.border};border-radius:2px;transition:width 1s"></div>
    </div>
  </div>

  <!-- 지표 4개 -->
  <div class="indicator-grid">
    ${renderIndCard('VWAP', r.indicators?.vwap)}
    ${renderIndCard('거래량', r.indicators?.volume)}
    ${renderIndCard('OI', r.indicators?.oi)}
    ${renderIndCard('RSI', r.indicators?.rsi)}
  </div>

  <!-- 체크리스트 -->
  <div class="sec-card">
    <div class="sec-title">핵심 조건 체크</div>
    <div class="checklist">
      ${(r.checklist||[]).map(c => `
        <div class="check-item check-${c.status}">
          <div class="check-dot"></div>
          <span>${escHtml(c.item)}</span>
        </div>`).join('')}
    </div>
  </div>

  <!-- 현재 상황 -->
  <div class="sec-card">
    <div class="sec-title">현재 상황 요약</div>
    <div class="sec-body">${escHtml(r.summary||'').replace(/\n/g,'<br>')}</div>
  </div>

  <!-- 행동 지침 -->
  <div id="verdict-card" style="background:rgba(0,0,0,.2);border-color:${actionColor}">
    <div id="verdict-title" style="color:${actionColor}">
      ▶ ${escHtml(r.action||'--')}
    </div>
    <div id="verdict-body">${escHtml(r.action_detail||'').replace(/\n/g,'<br>')}</div>
  </div>

  <!-- 주의사항 -->
  <div class="warning-box">
    ⚠ ${escHtml(r.warning||'')}
  </div>

</div>`;

  const body = document.getElementById('result-body');
  document.querySelectorAll('.result-cards').forEach(el => el.remove());
  const div = document.createElement('div');
  div.innerHTML = html;
  while(div.firstChild) body.appendChild(div.firstChild);

  // 단계 이모지 수정
  const stageEmojis = ['❌','⚠️','🔵','🟣','🚀'];
  const snEl = document.getElementById('stage-number');
  if(snEl) snEl.textContent = (stageEmojis[r.stage-1]||'⭕') + ' 단계 ' + r.stage;
}

function renderIndCard(label, ind) {
  if(!ind) return `<div class="ind-card"><div class="ind-label">${label}</div><div class="ind-value" style="color:var(--tx2)">--</div></div>`;
  const statusColor = getStatusColor(label, ind.status);
  return `<div class="ind-card">
    <div class="ind-label">${label}</div>
    <div class="ind-value" style="color:${statusColor}">${escHtml(ind.status||'--')}${ind.value && ind.value !== '불명확' ? ' ' + ind.value : ''}</div>
    <div class="ind-sub">${escHtml(ind.detail||'')}</div>
  </div>`;
}

function getStatusColor(label, status) {
  if(!status) return 'var(--tx2)';
  const s = status.toLowerCase();
  if(s.includes('급증') || s.includes('위') || s.includes('과열') || s.includes('증가')) return 'var(--up)';
  if(s.includes('감소') || s.includes('아래') || s.includes('과매도')) return 'var(--dn)';
  if(s.includes('바닥') || s.includes('낮음') || s.includes('다이버전스')) return 'var(--yl)';
  if(s.includes('반전') || s.includes('50이상') || s.includes('유지')) return 'var(--cy)';
  return 'var(--tx1)';
}

function renderError(msg) {
  document.getElementById('result-loading').style.display = 'none';
  document.getElementById('result-badge').textContent = '오류';
  document.getElementById('result-badge').style.color = 'var(--dn)';
  const body = document.getElementById('result-body');
  const div = document.createElement('div');
  div.className = 'result-cards';
  div.innerHTML = `<div class="warning-box" style="margin-top:16px">
    <b>분석 오류 발생</b><br>${escHtml(msg)}<br><br>
    다시 시도하거나 다른 이미지를 사용하세요.
  </div>`;
  body.appendChild(div);
}

function escHtml(str) {
  if(!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
